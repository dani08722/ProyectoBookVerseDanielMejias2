<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Pedido - BookVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0">
                            <i class="bi bi-pencil-square"></i>
                            Editar pedido
                        </h4>
                    </div>
                    <div class="card-body p-4">

                        <form th:action="@{/admin/pedidos/editar/submit}" th:object="${pedido}" method="post">
                            <input type="hidden" th:field="*{idPedido}">
                            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger" role="alert">
                                <p class="fw-bold mb-2">Revisa los datos del pedido:</p>
                                <ul class="mb-0">
                                    <li th:each="error : ${#fields.errors('*')}" th:text="${error}">Error de validación</li>
                                </ul>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 mb-4">Datos del pedido</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="codigo" class="form-label fw-bold">Código</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                                        <input type="text" th:field="*{codigo}" class="form-control" id="codigo" readonly>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="estado" class="form-label fw-bold">Estado</label>
                                    <select th:field="*{estado}" class="form-select" id="estado" required>
                                        <option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}">PENDIENTE</option>
                                    </select>
                                </div>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 my-4">Cliente y envío</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="cliente" class="form-label fw-bold">Cliente</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text"
                                               th:value="${pedido.cliente != null ? pedido.cliente.nombre + ' ' + pedido.cliente.apellidos + ' - ' + pedido.cliente.email : 'Sin cliente'}"
                                               class="form-control"
                                               id="cliente"
                                               readonly>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="metodoPago" class="form-label fw-bold">Método de pago</label>
                                    <select th:field="*{metodoPago}" class="form-select" id="metodoPago" required>
                                        <option value="Tarjeta">Tarjeta</option>
                                        <option value="PayPal">PayPal</option>
                                        <option value="Transferencia">Transferencia</option>
                                        <option value="Efectivo">Efectivo</option>
                                        <option value="Pendiente">Pendiente</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="direccionEnvio" class="form-label fw-bold">Dirección de envío</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                        <input type="text" th:field="*{direccionEnvio}" class="form-control" id="direccionEnvio" placeholder="Calle, ciudad" required>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5 d-flex gap-3">
                                <button type="submit" class="btn btn-primary px-5 rounded-pill">
                                    <i class="bi bi-check-circle"></i> Guardar cambios
                                </button>
                                <a th:href="@{/admin/pedidos}" class="btn btn-outline-secondary px-5 rounded-pill">
                                    Cancelar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
