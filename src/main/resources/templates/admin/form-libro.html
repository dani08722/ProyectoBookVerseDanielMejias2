<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros - BookVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0">
                            <i class="bi bi-journal-plus"></i>
                            <span th:text="${modoEdicion ? 'Editar Libro' : 'Añadir Nuevo Libro'}">Añadir Nuevo Libro</span>
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <div th:if="${mensajeError}" class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-triangle"></i>
                            <span th:text="${mensajeError}">No se ha podido guardar el libro.</span>
                        </div>
                        
                        <form th:action="@{/admin/libros/submit}" th:object="${libro}" method="post">
                            <input type="hidden" name="modoEdicion" th:value="${modoEdicion}">
                            
                            <h5 class="text-primary border-bottom pb-2 mb-4">Información General</h5>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label for="isbn" class="form-label fw-bold">ISBN</label>
                                    <input type="text" th:field="*{isbn}" class="form-control" id="isbn" placeholder="978-..." th:readonly="${modoEdicion}" required>
                                </div>
                                <div class="col-md-8">
                                    <label for="titulo" class="form-label fw-bold">Título del Libro</label>
                                    <input type="text" th:field="*{titulo}" class="form-control" id="titulo" placeholder="Ej: El Quijote" required>
                                </div>
                                
                                <div class="col-md-6">
                                    <label for="autor" class="form-label fw-bold">Autor</label>
                                    <input type="text" th:field="*{autor}" class="form-control" id="autor" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="editorial" class="form-label fw-bold">Editorial</label>
                                    <input type="text" th:field="*{editorial}" class="form-control" id="editorial">
                                </div>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 my-4">Detalles Técnicos</h5>
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label for="anio" class="form-label fw-bold">Año Publicación</label>
                                    <input type="number" th:field="*{anioPublicacion}" class="form-control" id="anio">
                                </div>
                                <div class="col-md-3">
                                    <label for="genero" class="form-label fw-bold">Género</label>
                                    <input type="text" th:field="*{genero}" class="form-control" id="genero" placeholder="Fantasía, Drama...">
                                </div>
                                <div class="col-md-3">
                                    <label for="idioma" class="form-label fw-bold">Idioma</label>
                                    <input type="text" th:field="*{idioma}" class="form-control" id="idioma">
                                </div>
                                <div class="col-md-3">
                                    <label for="paginas" class="form-label fw-bold">Nº Páginas</label>
                                    <input type="number" th:field="*{numeroPaginas}" class="form-control" id="paginas">
                                </div>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 my-4">Venta e Inventario</h5>
                            <div class="row g-3 align-items-end">
                                <div class="col-md-4">
                                    <label for="precio" class="form-label fw-bold">Precio (€)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">€</span>
                                        <input type="number" step="0.01" th:field="*{precio}" class="form-control" id="precio" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label for="stock" class="form-label fw-bold">Stock Inicial</label>
                                    <input type="number" th:field="*{stock}" class="form-control" id="stock" required>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check form-switch mb-2">
                                        <input class="form-check-input" type="checkbox" th:field="*{disponible}" id="disponible" checked>
                                        <label class="form-check-label fw-bold" for="disponible">Disponible para la venta</label>
                                    </div>
                                </div>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 my-4">Apariencia y Contenido</h5>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="imagenUrl" class="form-label fw-bold">URL de la Imagen de Portada</label>
                                    <input type="url" th:field="*{imagenUrl}" class="form-control" id="imagenUrl" placeholder="https://...">
                                </div>
                                <div class="col-12">
                                    <label for="descripcion" class="form-label fw-bold">Descripción / Sinopsis</label>
                                    <textarea th:field="*{descripcion}" class="form-control" id="descripcion" rows="4"></textarea>
                                </div>
                            </div>

                            <div class="mt-5 d-flex gap-3">
                                <button type="submit" class="btn btn-primary px-5 rounded-pill">
                                    <i class="bi bi-check-circle"></i>
                                    <span th:text="${modoEdicion ? 'Guardar Cambios' : 'Crear Libro'}">Guardar Libro</span>
                                </button>
                                <a th:href="@{/admin/libros}" class="btn btn-outline-secondary px-5 rounded-pill">
                                    Cancelar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
