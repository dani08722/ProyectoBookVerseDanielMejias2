<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - BookVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0">
                            <i class="bi bi-person-plus"></i>
                            <span th:text="${cliente.idCliente == null ? 'Añadir nuevo cliente' : 'Editar cliente'}">Añadir nuevo cliente</span>
                        </h4>
                    </div>
                    <div class="card-body p-4">

                        <form th:action="@{/admin/clientes/submit}" th:object="${cliente}" method="post">
                            <input type="hidden" th:field="*{idCliente}">
                            <input type="hidden" th:field="*{user.id}">
                            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger" role="alert">
                                <p class="fw-bold mb-2">Revisa los datos del cliente:</p>
                                <ul class="mb-0">
                                    <li th:each="error : ${#fields.errors('*')}" th:text="${error}">Error de validación</li>
                                </ul>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 mb-4">Datos personales</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label fw-bold">Nombre</label>
                                    <input type="text" th:field="*{nombre}" class="form-control" id="nombre" placeholder="Pedro" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="apellidos" class="form-label fw-bold">Apellidos</label>
                                    <input type="text" th:field="*{apellidos}" class="form-control" id="apellidos" placeholder="Herrera" required>
                                </div>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 my-4">Contacto</h5>
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label for="email" class="form-label fw-bold">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="cliente@bookverse.com" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label for="telefono" class="form-label fw-bold">Teléfono</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input type="text" th:field="*{telefono}" class="form-control" id="telefono" placeholder="+34 600 000 000">
                                    </div>
                                </div>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 my-4">Dirección</h5>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="direccion" class="form-label fw-bold">Dirección</label>
                                    <input type="text" th:field="*{direccion}" class="form-control" id="direccion" placeholder="Calle, número, piso...">
                                </div>
                                <div class="col-md-4">
                                    <label for="ciudad" class="form-label fw-bold">Ciudad</label>
                                    <input type="text" th:field="*{ciudad}" class="form-control" id="ciudad" placeholder="Sevilla">
                                </div>
                                <div class="col-md-4">
                                    <label for="codigoPostal" class="form-label fw-bold">Código postal</label>
                                    <input type="text" th:field="*{codigoPostal}" class="form-control" id="codigoPostal" placeholder="41000">
                                </div>
                                <div class="col-md-4">
                                    <label for="pais" class="form-label fw-bold">País</label>
                                    <input type="text" th:field="*{pais}" class="form-control" id="pais" placeholder="España">
                                </div>
                            </div>

                            <h5 class="text-primary border-bottom pb-2 my-4">Acceso</h5>
                            <div class="row g-3 align-items-end">
                                <div class="col-md-6">
                                    <label for="username" class="form-label fw-bold">Nombre de usuario</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" th:field="*{user.username}" class="form-control" id="username" placeholder="pedro.herrera" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="password" class="form-label fw-bold">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                        <input type="password" th:field="*{user.password}" class="form-control" id="password" placeholder="*******" th:required="${cliente.idCliente == null}">
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5 d-flex gap-3">
                                <button type="submit" class="btn btn-primary px-5 rounded-pill">
                                    <i class="bi bi-check-circle"></i>
                                    <span th:text="${cliente.idCliente == null ? 'Crear Cliente' : 'Guardar Cambios'}">Crear Cliente</span>
                                </button>
                                <a th:href="@{/admin/clientes}" class="btn btn-outline-secondary px-5 rounded-pill">
                                    Cancelar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
