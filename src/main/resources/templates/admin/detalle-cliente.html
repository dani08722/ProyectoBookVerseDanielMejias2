<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Cliente - BookVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h2 fw-bold mb-1">Detalle de cliente</h1>
                <p class="text-muted mb-0" th:text="${cliente.nombre + ' ' + cliente.apellidos}">Nombre Apellidos</p>
            </div>
            <div class="btn-group">
                <a th:href="@{/admin/clientes}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
                <a th:href="@{/admin/clientes/editar/{id}(id=${cliente.idCliente})}" class="btn btn-primary">
                    <i class="bi bi-pencil-square"></i> Editar
                </a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-dark text-white">
                        <i class="bi bi-person-lines-fill me-2"></i> Datos personales
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-sm-4">ID</dt>
                            <dd class="col-sm-8" th:text="${cliente.idCliente}">1</dd>

                            <dt class="col-sm-4">Nombre</dt>
                            <dd class="col-sm-8" th:text="${cliente.nombre}">Nombre</dd>

                            <dt class="col-sm-4">Apellidos</dt>
                            <dd class="col-sm-8" th:text="${cliente.apellidos}">Apellidos</dd>

                            <dt class="col-sm-4">Fecha registro</dt>
                            <dd class="col-sm-8" th:text="${cliente.fechaRegistro}">2026-05-19</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-dark text-white">
                        <i class="bi bi-person-circle me-2"></i> Cuenta
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-sm-4">Usuario</dt>
                            <dd class="col-sm-8" th:text="${cliente.user != null ? cliente.user.username : '-'}">usuario</dd>

                            <dt class="col-sm-4">Rol</dt>
                            <dd class="col-sm-8" th:text="${cliente.user != null ? cliente.user.role : '-'}">USER</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-dark text-white">
                        <i class="bi bi-envelope me-2"></i> Contacto
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-sm-4">Email</dt>
                            <dd class="col-sm-8" th:text="${cliente.email}">cliente@bookverse.com</dd>

                            <dt class="col-sm-4">Telefono</dt>
                            <dd class="col-sm-8" th:text="${cliente.telefono}">600 000 000</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-dark text-white">
                        <i class="bi bi-geo-alt me-2"></i> Direccion
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-sm-4">Direccion</dt>
                            <dd class="col-sm-8" th:text="${cliente.direccion}">Calle</dd>

                            <dt class="col-sm-4">Ciudad</dt>
                            <dd class="col-sm-8" th:text="${cliente.ciudad}">Sevilla</dd>

                            <dt class="col-sm-4">Codigo postal</dt>
                            <dd class="col-sm-8" th:text="${cliente.codigoPostal}">41000</dd>

                            <dt class="col-sm-4">Pais</dt>
                            <dd class="col-sm-8" th:text="${cliente.pais}">Espana</dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
