<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Clientes - BookVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h2 fw-bold mb-1">Gestion de clientes</h1>
                <p class="text-muted mb-0">Clientes registrados en BookVerse.</p>
            </div>
            <a th:href="@{/admin/clientes/crear}" class="btn btn-primary rounded-pill">
                <i class="bi bi-plus-circle"></i> Crear cliente
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Cliente</th>
                                <th scope="col">Email</th>
                                <th scope="col">Telefono</th>
                                <th scope="col">Ciudad</th>
                                <th scope="col">Fecha registro</th>
                                <th scope="col">Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cliente : ${clientes}">
                                <td th:text="${cliente.idCliente}">1</td>
                                <td class="fw-semibold" th:text="${cliente.nombre + ' ' + cliente.apellidos}">Nombre Apellidos</td>
                                <td th:text="${cliente.email}">cliente@bookverse.com</td>
                                <td th:text="${cliente.telefono}">600 000 000</td>
                                <td th:text="${cliente.ciudad}">Sevilla</td>
                                <td th:text="${cliente.fechaRegistro}">2026-05-19</td>
                                <td>
                                    <span th:if="${cliente.activo}" class="badge text-bg-success">Activo</span>
                                    <span th:unless="${cliente.activo}" class="badge text-bg-secondary">Inactivo</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(clientes)}" class="alert alert-info mt-4" role="alert">
            No hay clientes creados todavia.
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
