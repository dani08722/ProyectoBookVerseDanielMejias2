<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookVerse - Tu tienda de libros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/card-libros.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container my-5 flex-grow-1">
		
		<section class="bg-white py-5 text-center border-bottom shadow-sm">
		            <div class="container py-4">
		                <h1 class="display-4 fw-bold text-dark mb-3">Bienvenido a BookVerse</h1>
		                <p class="lead text-secondary mb-4">Descubre tu próxima aventura literaria entre miles de títulos.</p>
		                <a th:href="@{/catalogo}" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">Ver Catálogo completo</a>
		            </div>
		        </section>
		
        <div class="d-flex justify-content-between align-items-end mb-4">
            <h2 class="mb-0 fw-bold text-dark">Libros Destacados</h2>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col" th:each="libro : ${librosDestacados}">
                <div class="card h-100 shadow-sm border-0 rounded-3 transition-transform">
                    <img th:src="${libro.imagenUrl != null ? libro.imagenUrl : 'https://via.placeholder.com/150x200?text=Portada'}"
                         class="card-img-top rounded-top-3"
                         alt="Portada del libro">

                    <div class="card-body d-flex flex-column">
                        <span class="badge bg-secondary mb-2 align-self-start" th:text="${libro.genero}">Género</span>
                        <h5 class="card-title fw-bold text-truncate" th:text="${libro.titulo}">Título del Libro</h5>
                        <p class="card-text text-muted small mb-3" th:text="${libro.autor}">Autor</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="fs-5 fw-bold text-primary" th:text="${#numbers.formatDecimal(libro.precio, 1, 2)} + ' EUR'">19.99 EUR</span>
                        </div>
                    </div>

                    <div class="card-footer bg-transparent border-0 pb-3 pt-0 d-grid">
                        <a th:href="@{/libros/{isbn}(isbn=${libro.isbn})}"
                           class="btn btn-outline-dark btn-sm rounded-pill mb-2">
                            Ver detalle
                        </a>
                        <a th:href="@{/productoACarrito/{isbn}(isbn=${libro.isbn})}"
                           class="btn btn-dark w-100 rounded-pill d-flex justify-content-center align-items-center gap-2">
                            <i class="bi bi-cart-plus"></i> Añadir
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
