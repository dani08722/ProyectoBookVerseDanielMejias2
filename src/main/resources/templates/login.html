<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - BookVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/login.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="login-section d-flex align-items-center py-5 flex-grow-1">
        <div class="container">
            <div class="card login-card mx-auto border-0 shadow-sm rounded-3 overflow-hidden">
                    <section class="bg-white p-4 p-md-5">
                        <div class="mb-4">
                            <p class="text-primary fw-bold mb-1">Mi Cuenta</p>
                            <h2 class="h3 fw-bold text-dark mb-2">Iniciar sesión</h2>
                            <p class="text-secondary mb-0">Introduce tus datos para entrar en BookVerse.</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span>El usuario o la contraseña no son correctos.</span>
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
                            <i class="bi bi-check-circle-fill"></i>
                            <span>Has cerrado sesión correctamente.</span>
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light">
                                        <i class="bi bi-person text-primary"></i>
                                    </span>
                                    <input type="text"
                                           class="form-control"
                                           id="username"
                                           name="username"
                                           placeholder="Nombre de usuario"
                                           autocomplete="username"
                                           required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light">
                                        <i class="bi bi-lock text-primary"></i>
                                    </span>
                                    <input type="password"
                                           class="form-control"
                                           id="password"
                                           name="password"
                                           placeholder="Contraseña"
                                           autocomplete="current-password"
                                           required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center gap-3 mb-4 flex-wrap">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="remember-me" id="remember-me" name="remember-me">
                                    <label class="form-check-label text-secondary" for="remember-me">
                                        Recordarme
                                    </label>
                                </div>
                                <a href="#" class="link-primary text-decoration-none small fw-semibold">He olvidado mi contraseña</a>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                            </button>
                        </form>

                        <div class="border-top mt-4 pt-4 text-center">
                            <p class="text-secondary mb-0">
                                ¿Todavía no tienes cuenta?
                                <a th:href="@{/registro}" class="fw-semibold text-decoration-none">Regístrate</a>
                            </p>
                        </div>
                    </section>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
