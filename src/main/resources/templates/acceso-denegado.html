<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso denegado - BookVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/acceso-denegado.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="error-section d-flex align-items-center py-5 flex-grow-1">
        <div class="container">
            <section class="card error-card mx-auto border-0 shadow-sm rounded-3 p-4 p-md-5 text-center">
                <div class="error-icon rounded-circle bg-danger-subtle text-danger d-inline-flex align-items-center justify-content-center mx-auto mb-4">
                    <i class="bi bi-shield-lock fs-1"></i>
                </div>

                <p class="text-danger fw-bold mb-2">Acceso denegado</p>
                <h1 class="h3 fw-bold text-dark mb-3">No tienes suficientes permisos</h1>
                <p class="text-secondary mb-4">
                    Esta zona solo está disponible para administradores.
                </p>

                <a th:href="@{/catalogo}" class="btn btn-primary btn-lg rounded-pill px-4">
                    <i class="bi bi-arrow-left me-2"></i> Volver al catálogo
                </a>
            </section>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
