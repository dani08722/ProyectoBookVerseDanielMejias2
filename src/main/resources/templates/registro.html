<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - BookVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/registro.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="registro-section d-flex align-items-center py-5 flex-grow-1">
        <div class="container">
            <section class="card registro-card mx-auto border-0 shadow-sm rounded-3 p-4 p-md-5">
                <div class="mb-4 text-center">
                    <div class="registro-icon rounded-circle bg-primary-subtle text-primary d-inline-flex align-items-center justify-content-center mx-auto mb-4">
                        <i class="bi bi-person-plus fs-1"></i>
                    </div>
                    <p class="text-primary fw-bold mb-2">Crear cuenta</p>
                    <h1 class="h3 fw-bold text-dark mb-2">Registrate en BookVerse</h1>
                    <p class="text-secondary mb-0">Completa tus datos para guardar tus pedidos y comprar más rápido.</p>
                </div>

                <div th:if="${mensajeError}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${mensajeError}">No se ha podido crear la cuenta.</span>
                </div>

                <form th:action="@{/registro}" th:object="${cliente}" method="post">
                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger" role="alert">
                        <p class="fw-bold mb-2">Revisa tus datos:</p>
                        <ul class="mb-0">
                            <li th:each="error : ${#fields.errors('*')}" th:text="${error}">Error de validación</li>
                        </ul>
                    </div>
                    <h2 class="h5 text-primary border-bottom pb-2 mb-4">Datos personales</h2>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nombre" class="form-label fw-semibold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" id="nombre" placeholder="Pedro" required>
                        </div>
                        <div class="col-md-6">
                            <label for="apellidos" class="form-label fw-semibold">Apellidos</label>
                            <input type="text" th:field="*{apellidos}" class="form-control" id="apellidos" placeholder="Herrera" required>
                        </div>
                    </div>

                    <h2 class="h5 text-primary border-bottom pb-2 my-4">Contacto</h2>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-envelope text-primary"></i></span>
                                <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="cliente@bookverse.com" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label for="telefono" class="form-label fw-semibold">Teléfono</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-telephone text-primary"></i></span>
                                <input type="text" th:field="*{telefono}" class="form-control" id="telefono" placeholder="+34 600 000 000">
                            </div>
                        </div>
                    </div>

                    <h2 class="h5 text-primary border-bottom pb-2 my-4">Dirección</h2>
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="direccion" class="form-label fw-semibold">Dirección</label>
                            <input type="text" th:field="*{direccion}" class="form-control" id="direccion" placeholder="Calle, número, piso...">
                        </div>
                        <div class="col-md-4">
                            <label for="ciudad" class="form-label fw-semibold">Ciudad</label>
                            <input type="text" th:field="*{ciudad}" class="form-control" id="ciudad" placeholder="Sevilla">
                        </div>
                        <div class="col-md-4">
                            <label for="codigoPostal" class="form-label fw-semibold">Código postal</label>
                            <input type="text" th:field="*{codigoPostal}" class="form-control" id="codigoPostal" placeholder="41000">
                        </div>
                        <div class="col-md-4">
                            <label for="pais" class="form-label fw-semibold">País</label>
                            <input type="text" th:field="*{pais}" class="form-control" id="pais" placeholder="España">
                        </div>
                    </div>

                    <h2 class="h5 text-primary border-bottom pb-2 my-4">Acceso</h2>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person text-primary"></i></span>
                                <input type="text" th:field="*{user.username}" class="form-control" id="username" placeholder="pedro.herrera" autocomplete="username" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="password" class="form-label fw-semibold">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-shield-lock text-primary"></i></span>
                                <input type="password" th:field="*{user.password}" class="form-control" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-5">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                            <i class="bi bi-person-check me-2"></i> Crear cuenta
                        </button>
                        <a th:href="@{/login}" class="btn btn-outline-dark btn-lg rounded-pill">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Ya tengo cuenta
                        </a>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
