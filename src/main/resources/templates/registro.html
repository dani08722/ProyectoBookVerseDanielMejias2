<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro no disponible - BookVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="registro-section d-flex align-items-center py-5 flex-grow-1">
        <div class="container">
            <section class="card registro-card mx-auto border-0 shadow-sm rounded-3 p-4 p-md-5 text-center">
                <div class="registro-icon rounded-circle bg-primary-subtle text-primary d-inline-flex align-items-center justify-content-center mx-auto mb-4">
                    <i class="bi bi-person-plus fs-1"></i>
                </div>

                <p class="text-primary fw-bold mb-2">Registro de usuarios</p>
                <h1 class="h3 fw-bold text-dark mb-3">Esta funcion todavia no esta disponible</h1>
                <p class="text-secondary mb-4">
                    Estamos preparando el registro para que puedas crear tu cuenta en BookVerse. Mientras tanto, puedes seguir explorando nuestro catalogo.
                </p>

                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <a th:href="@{/catalogo}" class="btn btn-primary btn-lg rounded-pill px-4">
                        <i class="bi bi-book me-2"></i> Ver catalogo
                    </a>
                    <a th:href="@{/login}" class="btn btn-outline-dark btn-lg rounded-pill px-4">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Volver al login
                    </a>
                </div>
            </section>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
