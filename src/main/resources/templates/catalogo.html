<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - BookVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/card-libros.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

	<header th:replace="~{fragments/header :: header}"></header>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card border-0 shadow-sm rounded-3 filter-section p-3">
                    <h5 class="fw-bold mb-3">Filtros</h5>
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Género</label>
                            <select class="form-select form-select-sm">
                                <option value="">Todos los géneros</option>
                                <option value="Fantasia">Fantasía</option>
                                <option value="Clasico">Clásicos</option>
                                <option value="Ciencia Ficcion">Ciencia Ficción</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Precio Máximo</label>
                            <input type="range" class="form-range" min="0" max="100" step="5">
                        </div>
                        <button type="button" class="btn btn-primary btn-sm w-100">Aplicar Filtros</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0">Todos los Libros</h2>
                    <span class="text-muted" th:text="${#lists.size(libros)} + ' títulos encontrados'"></span>
                </div>

                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                    <div class="col" th:each="libro : ${libros}">
                        <div class="card h-100 border-0 shadow-sm rounded-3">
                            <img th:src="${libro.imagenUrl != null ? libro.imagenUrl : 'https://via.placeholder.com/300x400?text=Sin+Portada'}" 
                                 class="card-img-top rounded-top-3" alt="Portada">
                            
                            <div class="card-body d-flex flex-column">
                                <small class="text-primary fw-bold" th:text="${libro.genero}">Género</small>
                                <h5 class="card-title fw-bold" th:text="${libro.titulo}">Título</h5>
                                <p class="card-text text-muted small" th:text="${libro.autor}">Autor</p>
                                
                                <div class="mt-auto d-flex justify-content-between align-items-center">
                                    <span class="h5 fw-bold mb-0" th:text="${#numbers.formatDecimal(libro.precio, 1, 2)} + '€'"></span>
                                    <span th:if="${libro.stock > 0}" class="badge bg-success-subtle text-success">En stock</span>
                                    <span th:unless="${libro.stock > 0}" class="badge bg-danger-subtle text-danger">Agotado</span>
                                </div>
                            </div>
                            
                            <div class="card-footer bg-transparent border-0 pb-3 d-grid">
                                <a th:href="@{/libros/{id}(id=${libro.isbn})}" class="btn btn-outline-dark btn-sm rounded-pill mb-2">Ver detalle</a>
                                <a th:href="@{/productoACarrito/{isbn}(isbn=${libro.isbn})}"
                                   class="btn btn-primary btn-sm w-100 rounded-pill"
                                   th:classappend="${libro.stock == 0} ? ' disabled'"
                                   th:aria-disabled="${libro.stock == 0}">
                                    <i class="bi bi-cart-plus"></i> Añadir al carrito
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div th:if="${#lists.isEmpty(libros)}" class="text-center py-5">
                    <i class="bi bi-search fs-1 text-muted"></i>
                    <p class="mt-3">No hemos encontrado libros en el catálogo actualmente.</p>
                </div>
            </div>
        </div>
    </div>
	
	<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
