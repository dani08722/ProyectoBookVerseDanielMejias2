<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" th:href="@{/}">
                    <i class="bi bi-book-half text-primary"></i> BookVerse
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" th:href="@{/index}">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/catalogo}">Catalogo</a>
                        </li>
                        <li class="nav-item dropdown" th:if="${@securityConfig.isAdmin()}">
                            <a class="nav-link dropdown-toggle" href="#" id="gestionarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-gear"></i> Gestionar
                            </a>
                            <ul class="dropdown-menu shadow-sm border-0 mt-2" aria-labelledby="gestionarDropdown">
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/admin/libros}">
                                        <i class="bi bi-book me-2 text-primary"></i> Libros
                                    </a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/admin/clientes}">
                                        <i class="bi bi-people me-2 text-primary"></i> Clientes
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item py-2 disabled" href="#" aria-disabled="true">
                                        <i class="bi bi-receipt me-2 text-secondary"></i> Pedidos
                                    </a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                    <ul class="navbar-nav align-items-center">
                        <li class="nav-item me-3">
                            <a class="nav-link position-relative" th:href="@{/carrito}">
                                <i class="bi bi-cart3 fs-5"></i>
                                <span class="position-absolute top-25 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65em;">
                                    0
                                </span>
                            </a>
                        </li>

                        <li class="nav-item dropdown" >
                            <a class="btn btn-outline-light btn-sm px-4 rounded-pill dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-person-circle"></i> Mi Cuenta
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2" aria-labelledby="navbarDropdown">
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/login}">
                                        <i class="bi bi-box-arrow-in-right me-2 text-primary"></i> Iniciar Sesion
                                    </a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/registro}">
                                        <i class="bi bi-person-plus me-2 text-success"></i> Registrarse
                                    </a>
                                </li>
                            </ul>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>

        
    </header>
</body>
</html>
